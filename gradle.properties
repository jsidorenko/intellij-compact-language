# Give Gradle and the build a comfortable heap; IntelliJ Platform builds are memory hungry.
org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
org.gradle.caching=true
# The IntelliJ Platform tasks are not fully configuration-cache compatible; keep it off.
org.gradle.configuration-cache=false

# stdlib is provided by the IntelliJ Platform at runtime, so don't bundle it in the zip.
kotlin.stdlib.default.dependency=false
